<!DOCTYPE html>
<html>
<head>
  <title>Frontend Service</title>
</head>
<body>
  <h1>Frontend Service</h1>
  <button onclick="orderProduct()">Order Product</button>
  <pre id="result"></pre>

  <script>
    function orderProduct() {
      fetch("http://user-service:8080/order", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username: "A", product: "B"})
      })
      .then(res => res.text())
      .then(data => document.getElementById('result').innerText = data)
      .catch(err => document.getElementById('result').innerText = err);
    }
  </script>
</body>
</html>
